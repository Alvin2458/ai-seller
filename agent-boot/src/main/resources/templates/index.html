<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Seller - Outbound Call Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            display: block;
        }

        .result.error {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
            display: block;
        }

        .result.info {
            background: #dbeafe;
            border: 1px solid #3b82f6;
            color: #1e40af;
            display: block;
        }

        .active-calls {
            margin-top: 30px;
        }

        .active-calls h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .call-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .call-info {
            flex: 1;
        }

        .call-info .phone {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .call-info .status {
            font-size: 12px;
            color: #666;
        }

        .call-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-hangup {
            background: #ef4444;
            color: white;
        }

        .btn-hangup:hover {
            background: #dc2626;
        }

        .btn-refresh {
            background: #3b82f6;
            color: white;
        }

        .btn-refresh:hover {
            background: #2563eb;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 AI Seller - Extension Call</h1>
        <p class="subtitle">Make calls to extension numbers via FreeSWITCH</p>

        <form id="callForm">
            <div class="form-group">
                <label for="extensionNumber">Extension Number *</label>
                <input type="text" id="extensionNumber" placeholder="e.g., 1001" required>
            </div>

            <div class="form-group">
                <label for="callerId">Caller ID (Optional)</label>
                <input type="text" id="callerId" placeholder="e.g., 1000">
            </div>

            <button type="submit" class="btn btn-primary" id="callBtn">
                Make Call
            </button>
        </form>

        <div id="result" class="result"></div>

        <div class="active-calls">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">Active Calls</h2>
                <button class="btn-small btn-refresh" onclick="loadActiveCalls()">Refresh</button>
            </div>
            <div id="callsList">
                <p style="color: #999; text-align: center; padding: 20px;">No active calls</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/calls';

        // Handle form submission
        document.getElementById('callForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const extensionNumber = document.getElementById('extensionNumber').value;
            const callerId = document.getElementById('callerId').value;
            
            const callBtn = document.getElementById('callBtn');
            callBtn.disabled = true;
            callBtn.innerHTML = '<span class="loading"></span>Calling...';
            
            try {
                const response = await fetch(`${API_BASE}/outbound`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        extensionNumber,
                        callerId: callerId || undefined
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showResult('success', `✅ Call initiated successfully!<br>Call ID: ${result.callId}<br>Extension: ${result.phoneNumber}`);
                } else {
                    showResult('error', `❌ Failed to initiate call: ${result.message}`);
                }
            } catch (error) {
                showResult('error', `❌ Error: ${error.message}`);
            } finally {
                callBtn.disabled = false;
                callBtn.textContent = 'Make Call';
            }
            
            // Refresh active calls
            loadActiveCalls();
        });

        // Load active calls
        async function loadActiveCalls() {
            try {
                const response = await fetch(API_BASE);
                const calls = await response.json();
                
                const callsList = document.getElementById('callsList');
                
                if (Object.keys(calls).length === 0) {
                    callsList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">No active calls</p>';
                    return;
                }
                
                callsList.innerHTML = Object.values(calls).map(call => `
                    <div class="call-item">
                        <div class="call-info">
                            <div class="phone">${call.phoneNumber}</div>
                            <div class="status">Status: ${call.status} | Duration: ${formatDuration(call.duration)}</div>
                        </div>
                        <div class="call-actions">
                            <button class="btn-small btn-hangup" onclick="hangupCall('${call.callId}')">Hangup</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load active calls:', error);
            }
        }

        // Hangup call
        async function hangupCall(callId) {
            try {
                const response = await fetch(`${API_BASE}/${callId}/hangup`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    showResult('success', '✅ Call hung up successfully');
                    loadActiveCalls();
                } else {
                    showResult('error', '❌ Failed to hangup call');
                }
            } catch (error) {
                showResult('error', `❌ Error: ${error.message}`);
            }
        }

        // Show result message
        function showResult(type, message) {
            const result = document.getElementById('result');
            result.className = `result ${type}`;
            result.innerHTML = message;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                result.className = 'result';
            }, 5000);
        }

        // Format duration
        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            
            if (hours > 0) {
                return `${hours}h ${minutes % 60}m ${seconds % 60}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${seconds % 60}s`;
            } else {
                return `${seconds}s`;
            }
        }

        // Load active calls on page load
        loadActiveCalls();
        
        // Auto refresh every 5 seconds
        setInterval(loadActiveCalls, 5000);
    </script>
</body>
</html>
